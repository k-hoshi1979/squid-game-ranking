</head>

<div class="container" id="admin-content">

    <section>

                    <th>„Ç¢„Ç´„Ç¶„É≥„Éà („É°„Éº„É´)</th>
                    <th>ÊúÄÊñ∞Âêç</th>

</div>

<script>
    const SB_URL = 'https://wdlakjpidubkiiwhzigq.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkbGFranBpZHVia2lpd2h6aWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTU3ODMsImV4cCI6MjA4OTQ5MTc4M30.WxPL0GUR0UEETnwkz-s-z5cEVK_LjdhKhLEpDmnU_Ow';
    const ADMIN_PASS = "shibuya0116"; // Ë®≠ÂÆö„Åï„Çå„Åü„Éë„Çπ„ÉØ„Éº„Éâ
    
    const client = supabase.createClient(SB_URL, SB_KEY);
    let allRawData = [];

    // „Éë„Çπ„ÉØ„Éº„Éâ„ÉÅ„Çß„ÉÉ„ÇØ
    function checkAccess() {
        const input = document.getElementById('access-pass').value;
        if (input === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadData();
        } else {
            alert("„Éë„Çπ„ÉØ„Éº„Éâ„ÅåÊ≠£„Åó„Åè„ÅÇ„Çä„Åæ„Åõ„Çì„ÄÇ");
        }
    }

    async function loadData() {
        const { data, error } = await client.from('game_entries').select('*').order('created_at', { ascending: false });
        if (error) return;
        allRawData = data;
        renderTable();
    }

    function renderTable() {
        const searchText = document.getElementById('search_input').value.toLowerCase();
        const tbody = document.getElementById('user-list-body');
        tbody.innerHTML = "";

        const filtered = allRawData.filter(item => 
            item.email.toLowerCase().includes(searchText) || item.game_id.toLowerCase().includes(searchText)
        );

        const stats = filtered.reduce((acc, cur) => {
            if (!acc[cur.email]) acc[cur.email] = { name: cur.nickname, count: 0, entries: [], last: cur.created_at };
            if (new Date(cur.created_at) > new Date(acc[cur.email].last)) {
                acc[cur.email].name = cur.nickname;
                acc[cur.email].last = cur.created_at;
            }
            acc[cur.email].count++;
            acc[cur.email].entries.push(cur);
            return acc;
        }, {});

        Object.keys(stats).forEach((email, i) => {
            const user = stats[email];
            const row = document.createElement('tr');
            row.className = "user-row";
            row.onclick = () => {
                const el = document.getElementById(`details-${i}`);
                el.style.display = (el.style.display === 'table-row') ? 'none' : 'table-row';
            };
            row.innerHTML = `<td>${email}</td><td>${user.name}</td><td><span class="win-badge">${user.count}</span></td>`;
            
            const detailRow = document.createElement('tr');
            detailRow.id = `details-${i}`;
            detailRow.className = "details-row";
            let entryHtml = user.entries.map(e => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #ddd;">
                    <span>ID: ${e.game_id} | ${e.nickname} (${new Date(e.created_at).toLocaleDateString()})</span>
                    <button class="btn-del" onclick="deleteEntry('${e.id}')">ÂâäÈô§</button>
                </div>
            `).join('');
            detailRow.innerHTML = `<td colspan="3" style="padding:10px 30px;">${entryHtml}</td>`;
            
            tbody.appendChild(row);
            tbody.appendChild(detailRow);
        });
    }

    // ÂÖ®„Éá„Éº„ÇøÂâäÈô§Ê©üËÉΩ
    async function allClear() {
        const confirm1 = confirm("‚öÝÔ∏èË≠¶ÂëäÔºöÊú¨ÂΩì„Å´ÂÖ®„Å¶„ÅÆ„Éá„Éº„Çø„ÇíÂÆåÂÖ®„Å´Ê∂àÂéª„Åó„Åæ„Åô„ÅãÔºü\n„Åì„ÅÆÊìç‰Ωú„ÅØÂèñ„ÇäÊ∂à„Åõ„Åæ„Åõ„Çì„ÄÇ");
        if (!confirm1) return;

        const secondPass = prompt("Á¢∫Ë™ç„ÅÆ„Åü„ÇÅ„ÄÅÂÜçÂ∫¶„É≠„Ç∞„Ç§„É≥„Éë„Çπ„ÉØ„Éº„Éâ„ÇíÂÖ•Âäõ„Åó„Å¶„Åè„ÅÝ„Åï„ÅÑÔºö");
        if (secondPass !== ADMIN_PASS) {
            alert("„Éë„Çπ„ÉØ„Éº„Éâ„Åå‰∏ÄËá¥„Åó„Åæ„Åõ„Çì„ÄÇÂâäÈô§„Çí‰∏≠Ê≠¢„Åó„Åæ„Åó„Åü„ÄÇ");
            return;
        }

        const confirm2 = confirm("Êú¨ÂΩì„ÅÆÊú¨ÂΩì„Å´„Çà„Çç„Åó„ÅÑ„Åß„Åô„Å≠ÔºüÂÖ®„Éá„Éº„Çø„ÅåÊ∂à„Åà„Åæ„Åô„ÄÇ");
        if (!confirm2) return;

        // ÂÖ®‰ª∂ÂâäÈô§„ÅÆÂÆüË°åÔºàID„Åånull„Åß„Å™„ÅÑ„ÇÇ„ÅÆ„ÇíÂÖ®„Å¶ÂâäÈô§ = ÂÖ®ÂâäÈô§Ôºâ
        const { error } = await client.from('game_entries').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        
        if (error) {
            alert("„Ç®„É©„Éº„ÅåÁô∫Áîü„Åó„Åæ„Åó„Åü: " + error.message);
        } else {
            alert("ÂÖ®„Å¶„ÅÆ„Éá„Éº„Çø„ÇíÊ∂àÂéª„Åó„Åæ„Åó„Åü„ÄÇ„É©„É≥„Ç≠„É≥„Ç∞„ÅØ„É™„Çª„ÉÉ„Éà„Åï„Çå„Åæ„Åô„ÄÇ");
            location.reload();
        }
    }

    // Âçò‰∏ÄÂâäÈô§„ÉªCSV„ÉªÊñ∞Ë¶èÁôªÈå≤„Å™„Å©„ÅØ‰ª•Ââç„ÅÆ„É≠„Ç∏„ÉÉ„ÇØ„ÇíÁ∂ôÁ∂öÔºàÁúÅÁï•„Åõ„ÅöÁµÑ„ÅøËæº„ÅøÊ∏à„ÅøÔºâ
    async function deleteEntry(id) {
        if(!confirm("ÂâäÈô§„Åó„Åæ„Åô„ÅãÔºü")) return;
        await client.from('game_entries').delete().eq('id', id);
        loadData();
    }

    document.getElementById('csv-btn').onclick = () => {
        let csv = "\uFEFFÊó•ÊôÇ,Âêç,„É°„Ç¢„Éâ,ID\n";
        allRawData.forEach(r => csv += `${new Date(r.created_at).toLocaleString()},${r.nickname},${r.email},${r.game_id}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "data.csv";
        a.click();
    };

    document.getElementById('add-btn').onclick = async () => {
        const p = { nickname: document.getElementById('new_nickname').value, email: document.getElementById('new_email').value, game_id: document.getElementById('new_game_id').value };

        if(error) alert(error.message); else location.reload();
    };
</script>
