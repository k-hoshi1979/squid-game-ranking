<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SQUID GAME - SECURE ADMIN (ID Ver.)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; display: none; }
        h1 { color: #ff00de; border-left: 5px solid #ff00de; padding-left: 15px; }
        section { margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        .btn-add { background: #3ecf8e; color: white; width: 100%; }
        .btn-clear { background: #ff4d4d; color: white; float: right; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; }
        .user-row { cursor: pointer; }
        .user-row:hover { background: #f9f9f9; }
        .details-row { display: none; background: #fafafa; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        #login-screen h2 { color: #ff00de; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>ADMIN ACCESS</h2>
    <input type="password" id="access-pass" placeholder="PASSWORD">
    <button onclick="checkAccess()" style="background:#3ecf8e; color:white; margin-top:10px;">LOGIN</button>
</div>

<div class="container" id="admin-content">
    <h1>SQUID GAME 管理パネル</h1>

    <section>
        <h3>新規エントリー登録</h3>
        <div class="form-row">
            <input type="text" id="new_game_id" placeholder="ゲームID(公演用)">
            <input type="text" id="new_nickname" placeholder="ニックネーム">
            <input type="text" id="new_player_id" placeholder="4桁の数字(個人識別用)" maxlength="4">
            <button class="btn-add" id="add-btn">登録</button>
        </div>
    </section>

    <section>
        <h3>登録データ管理 <button class="btn-clear" onclick="allClear()">⚠️全データ消去</button></h3>
        <input type="text" id="search_input" placeholder="名前 または 4桁数字 で検索..." oninput="renderTable()" style="width:100%; box-sizing:border-box; margin-bottom:15px;">
        <table>
            <thead>
                <tr><th>アカウント</th><th>WIN数</th><th>操作</th></tr>
            </thead>
            <tbody id="user-list-body"></tbody>
        </table>
    </section>
</div>

<script>
    const SB_URL = 'https://wdlakjpidubkiiwhzigq.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkbGFranBpZHVia2lpd2h6aWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTU3ODMsImV4cCI6MjA4OTQ5MTc4M30.WxPL0GUR0UEETnwkz-s-z5cEVK_LjdhKhLEpDmnU_Ow';
    const ADMIN_PASS = "shibuya0116";
    const client = supabase.createClient(SB_URL, SB_KEY);
    let allRawData = [];

    function checkAccess() {
        if (document.getElementById('access-pass').value === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadData();
        } else alert("Wrong password");
    }

    async function loadData() {
        const { data, error } = await client.from('game_entries').select('*').order('created_at', { ascending: false });
        if (!error) { allRawData = data; renderTable(); }
    }

    function renderTable() {
        const searchText = document.getElementById('search_input').value.toLowerCase();
        const tbody = document.getElementById('user-list-body');
        tbody.innerHTML = "";

        const stats = allRawData.reduce((acc, cur) => {
            const userKey = `${cur.nickname}_${cur.email}`;
            if (!acc[userKey]) acc[userKey] = { name: cur.nickname, pin: cur.email, count: 0, entries: [] };
            acc[userKey].count++;
            acc[userKey].entries.push(cur);
            return acc;
        }, {});

        Object.keys(stats).filter(k => k.toLowerCase().includes(searchText)).forEach((key, i) => {
            const user = stats[key];
            const row = document.createElement('tr');
            row.className = "user-row";
            row.onclick = () => {
                const el = document.getElementById(`details-${i}`);
                el.style.display = (el.style.display === 'table-row') ? 'none' : 'table-row';
            };
            row.innerHTML = `<td>${user.name} (${user.pin})</td><td><b>${user.count}</b></td><td>詳細▼</td>`;
            
            const detailRow = document.createElement('tr');
            detailRow.id = `details-${i}`;
            detailRow.className = "details-row";
            detailRow.innerHTML = `<td colspan="3">${user.entries.map(e => `
                <div style="padding:5px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                    <span>${new Date(e.created_at).toLocaleTimeString()} | 🆔:${e.game_id}</span>
                    <button onclick="deleteEntry('${e.id}')" style="background:#ff4d4d; color:white; border:none; cursor:pointer;">削除</button>
                </div>`).join('')}</td>`;
            tbody.appendChild(row);
            tbody.appendChild(detailRow);
        });
    }

    document.getElementById('add-btn').onclick = async () => {
        const payload = {
            nickname: document.getElementById('new_nickname').value.trim(),
            email: document.getElementById('new_player_id').value.trim(), // 4桁IDをemail列に転用
            game_id: document.getElementById('new_game_id').value.trim()
        };
        if(!payload.nickname || !payload.email || !payload.game_id) return alert("入力不足");
        const { error } = await client.from('game_entries').insert([payload]);
        if(!error) { alert("登録完了"); loadData(); }
    };

    async function deleteEntry(id) {
        if(confirm("削除しますか？")) { await client.from('game_entries').delete().eq('id', id); loadData(); }
    }

    async function allClear() {
        if(confirm("全消去しますか？") && prompt("PASS?") === ADMIN_PASS) {
            await client.from('game_entries').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            location.reload();
        }
    }
</script>
</body>
</html>
