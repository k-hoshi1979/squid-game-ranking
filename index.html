<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUID GAME - 35s PERFECT LOOP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            background-image: url('画像/Piggy-Bank.jpg'); background-size: cover; background-position: center;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh;
        }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }

        /* --- 1. ロゴ（0-5秒に延長） --- */
        #logo-layer {
            position: fixed; inset: 0; background: #fff; z-index: 100;
            display: none; justify-content: center; align-items: center;
            opacity: 0;
        }
        #logo-layer img { max-width: 80%; height: auto; }

        /* --- 2. テロップ（5-15秒） --- */
        #telop-layer {
            position: fixed; inset: 0; z-index: 90;
            display: none; justify-content: center; align-items: center;
        }
        .telop-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .telop {
            position: absolute; width: 100%; text-align: center;
            font-size: calc(2.2rem + 2vw); font-weight: 900; opacity: 0;
            color: #fff; text-shadow: 0 0 20px #ff00de, 0 0 40px #ff00de, 2px 2px 5px #000;
            letter-spacing: 0.2em; pointer-events: none;
        }

        /* --- 3. ランキング（15-35秒） --- */
        #ranking-layer {
            position: relative; z-index: 80; opacity: 0;
            display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        h2 { font-size: 3rem; margin-bottom: 15px; color: #ff00de; text-shadow: 0 0 10px #ff00de; }
        #list-window {
            width: 90%; max-width: 800px; height: 70vh;
            border: 4px solid #3ecf8e; border-radius: 20px; overflow: hidden;
            background: rgba(0, 20, 0, 0.9); position: relative;
        }
        #ranking-list {
            list-style: none; padding: 0; margin: 0; width: 100%;
            position: absolute; top: 0; transform: translateY(85vh);
        }

        /* --- アニメーション設定 --- */
        .play-logo { display: flex !important; animation: logoFade 5s forwards; } /* 5秒に延長 */
        .play-ranking { display: flex !important; animation: fadeIn 1s forwards; }
        .play-scroll { animation: scrollUp 10s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes logoFade { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .t-active { animation: telopShow 3.3s forwards; } /* テロップ間隔も微調整 */
        @keyframes telopShow {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            15%, 85% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(1.1) translateY(-10px); }
        }

        @keyframes scrollUp {
            0% { transform: translateY(80vh); }
            100% { transform: translateY(0); }
        }

        .item { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 80px; border-bottom: 1px solid rgba(62, 207, 142, 0.3); font-size: 1.8rem; box-sizing: border-box; }
        .rank-1 { height: 120px; font-size: 2.5rem; color: #ffeb3b; background: rgba(255,235,59,0.1); }
        .rank-2 { height: 100px; font-size: 2.2rem; color: #e0e0e0; }
        .rank-3 { height: 90px; font-size: 2rem; color: #cd7f32; }
        .win { font-weight: bold; color: #ffeb3b; }

        #start-mask { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        button { padding: 20px 60px; font-size: 2rem; background: #ff00de; color: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-mask"><button id="start-btn">START SHOW</button></div>
    <audio id="bgm"><source src="BGM/Mainetheme.mp3" type="audio/mpeg"></audio>

    <div id="logo-layer"><img src="画像/VVIPロゴ.png" alt="Logo"></div>

    <div id="telop-layer">
        <div class="telop-container">
            <div id="t1" class="telop">真のTop of topを決める！</div>
            <div id="t2" class="telop">チャンピオンシップ開幕！</div>
            <div id="t3" class="telop">VVIPは誰の手に？</div>
        </div>
    </div>

    <div id="ranking-layer">
        <h2>SQUID GAME RANKING</h2>
        <div id="list-window">
            <ul id="ranking-list"></ul>
        </div>
    </div>

    <script>
        const SB_URL = 'https://wdlakjpidubkiiwhzigq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkbGFranBpZHVia2lpd2h6aWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTU3ODMsImV4cCI6MjA4OTQ5MTc4M30.WxPL0GUR0UEETnwkz-s-z5cEVK_LjdhKhLEpDmnU_Ow';
        const client = supabase.createClient(SB_URL, SB_KEY);
        const bgm = document.getElementById('bgm');

        async function runShowCycle() {
            // 状態リセット
            const logoLayer = document.getElementById('logo-layer');
            const telopLayer = document.getElementById('telop-layer');
            const rankingLayer = document.getElementById('ranking-layer');
            const listEl = document.getElementById('ranking-list');

            logoLayer.classList.remove('play-logo');
            rankingLayer.classList.remove('play-ranking');
            listEl.classList.remove('play-scroll');
            document.querySelectorAll('.telop').forEach(t => t.classList.remove('t-active'));
            
            logoLayer.style.display = 'none';
            telopLayer.style.display = 'none';
            rankingLayer.style.display = 'none';

            // 最新データ取得
            const { data } = await client.from('game_entries').select('*').gte('created_at', new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString());
            const stats = data.reduce((acc, cur) => {
                const key = `${cur.nickname.trim()}_${cur.email.trim()}`;
                if (!acc[key]) acc[key] = { name: cur.nickname, count: 0 };
                acc[key].count++; return acc;
            }, {});
            const sorted = Object.values(stats).sort((a, b) => b.count - a.count).slice(0, 10);
            listEl.innerHTML = sorted.map((d, i) => `<li class="item rank-${i+1}"><span>${i+1}位 ${d.name}</span><span class="win">${d.count} WIN</span></li>`).join('');

            // BGMリスタート（ループの頭で再生）
            bgm.currentTime = 0;
            bgm.play();

            // 1. ロゴ表示 (0s - 5s)
            setTimeout(() => {
                logoLayer.classList.add('play-logo');
            }, 100);

            // 2. テロップ表示 (5s - 15s)
            setTimeout(() => {
                logoLayer.style.display = 'none';
                telopLayer.style.display = 'flex';
                document.getElementById('t1').classList.add('t-active');
                setTimeout(() => document.getElementById('t2').classList.add('t-active'), 3300);
                setTimeout(() => document.getElementById('t3').classList.add('t-active'), 6600);
            }, 5000);

            // 3. ランキング表示 (15s - 35s)
            setTimeout(() => {
                telopLayer.style.display = 'none';
                rankingLayer.classList.add('play-ranking');
                setTimeout(() => {
                    listEl.classList.add('play-scroll');
                }, 100);
            }, 15000);

            // 4. 無限ループ (35秒ちょうど)
            setTimeout(() => {
                runShowCycle();
            }, 35000);
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-mask').style.display = 'none';
            runShowCycle();
        };
    </script>
</body>
</html>
